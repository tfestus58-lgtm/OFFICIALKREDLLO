<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0d2145" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Kreddlo" />
<link rel="apple-touch-icon" href="/assets/kreddlo-192.png" />
<!-- SEO -->
<meta name="description" content="Manage your freelance contracts on Kreddlo. View, sign, and track all agreements." />
<meta name="robots" content="noindex, nofollow" />
<title>Contracts — Kreddlo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="dns-prefetch" href="https://www.gstatic.com"/>
  <link rel="dns-prefetch" href="https://firestore.googleapis.com"/>
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        navy:'#0d2145','navy-deep':'#091830','navy-mid':'#162f5e',
        green:'#2d8a5e','green-light':'#3dbd7a','green-pale':'#e8f5ef',
        cream:'#f8f9fb',border:'#e2e8f0'
      },
      fontFamily: { sans: ['Plus Jakarta Sans','sans-serif'] }
    }
  }
};
</script>
<style>
*,*::before,*::after{box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8f9fb;color:#0d2145;margin:0;padding:0;-webkit-font-smoothing:antialiased}

/* Glass */
.glass{background:rgba(255,255,255,0.65);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.35);border-radius:20px;box-shadow:0 8px 32px rgba(13,33,69,0.08)}

/* Buttons */
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#0d2145;color:#fff;border:none;border-radius:50px;padding:12px 28px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(13,33,69,0.20);transition:transform .15s,box-shadow .15s,background .15s}
.btn-primary:hover{background:#162f5e;transform:translateY(-1px);box-shadow:0 6px 20px rgba(13,33,69,0.28)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:focus-visible{outline:2px solid #2d8a5e;outline-offset:3px}

.btn-secondary{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:transparent;color:#0d2145;border:2px solid #0d2145;border-radius:50px;padding:10px 22px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:transform .15s,background .15s,color .15s}
.btn-secondary:hover{background:#0d2145;color:#fff;transform:translateY(-1px)}
.btn-secondary:active{transform:translateY(0)}
.btn-secondary:focus-visible{outline:2px solid #2d8a5e;outline-offset:3px}

.btn-green{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#2d8a5e;color:#fff;border:none;border-radius:50px;padding:12px 28px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(45,138,94,0.30);transition:transform .15s,box-shadow .15s,background .15s}
.btn-green:hover{background:#236b49;transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,138,94,0.38)}
.btn-green:active{transform:translateY(0)}
.btn-green:focus-visible{outline:2px solid #3dbd7a;outline-offset:3px}

/* Input */
.input-field{width:100%;padding:12px 16px;background:rgba(255,255,255,0.85);border:1.5px solid #e2e8f0;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:#0d2145;outline:none;transition:border-color .2s,box-shadow .2s}
.input-field:focus{border-color:#2d8a5e;box-shadow:0 0 0 3px rgba(45,138,94,0.11)}
.input-field::placeholder{color:rgba(13,33,69,0.35)}

.lbl{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:rgba(13,33,69,0.48)}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:50px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap;flex-shrink:0}
.badge-green{background:#e8f5ef;color:#2d8a5e}
.badge-navy{background:rgba(13,33,69,0.08);color:#0d2145}
.badge-amber{background:#fff3cd;color:#856404}
.badge-blue{background:#e8f0fe;color:#1a56db}
.badge-red{background:#fde8e8;color:#c81e1e}
.badge-grey{background:rgba(13,33,69,0.07);color:rgba(13,33,69,0.55)}
.badge-purple{background:#f3e8ff;color:#6b21a8}

/* Skeleton */
.sk{background:linear-gradient(90deg,#f0f2f6 25%,#e8eaf0 50%,#f0f2f6 75%);background-size:200% 100%;animation:sk 1.5s infinite linear;border-radius:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Pills / Tabs */
.pill{display:inline-flex;align-items:center;justify-content:center;padding:9px 20px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:background .15s,color .15s,transform .15s}
.pill-inactive{background:rgba(13,33,69,0.06);color:#0d2145}
.pill-inactive:hover{background:rgba(13,33,69,0.10);transform:translateY(-1px)}
.pill-active{background:#0d2145;color:#fff;box-shadow:0 4px 16px rgba(13,33,69,0.20)}
.pill:focus-visible{outline:2px solid #2d8a5e;outline-offset:2px}

/* Nav */
.nav-link{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:11px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.52);text-decoration:none;transition:background .15s,color .15s;cursor:pointer;border:none;background:transparent;width:100%;text-align:left}
.nav-link:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.88)}
.nav-link.active{background:rgba(45,138,94,0.22);color:#fff;border-left:3px solid #3dbd7a;padding-left:10px}

/* Mobile menu */
.slide-in{transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.slide-in.open{transform:translateX(0)}
.dim{opacity:0;pointer-events:none;transition:opacity .28s}
.dim.open{opacity:1;pointer-events:all}

/* Contract card */
.contract-card{padding:20px;transition:box-shadow .2s;cursor:pointer}
.contract-card:hover{box-shadow:0 10px 40px rgba(13,33,69,0.13)}
.contract-title{font-size:15px;font-weight:700;color:#0d2145;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.35}
.meta-item{display:flex;align-items:center;gap:4px;color:rgba(13,33,69,0.50)}
.meta-item span{font-size:12px;font-weight:500;color:rgba(13,33,69,0.50)}

/* Signature row */
.sig-row{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.sig-check{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.sig-done{background:#e8f5ef;color:#2d8a5e}
.sig-pending{background:rgba(13,33,69,0.06);color:rgba(13,33,69,0.35)}

/* Modal */
.modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(9,24,48,0.55);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;padding:0}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -8px 40px rgba(13,33,69,0.18);width:100%;max-width:600px;max-height:88vh;overflow-y:auto;padding:28px 24px 40px}
.modal-handle{width:40px;height:4px;background:rgba(13,33,69,0.12);border-radius:2px;margin:0 auto 22px}

/* Contract view modal */
.contract-section{margin-bottom:24px}
.contract-section-title{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(13,33,69,0.45);margin-bottom:10px}
.contract-clause{font-size:14px;font-weight:500;color:#0d2145;line-height:1.65;padding:14px 16px;background:#f8f9fb;border-radius:12px;border-left:3px solid #e2e8f0;margin-bottom:8px}
.contract-clause.highlight{border-left-color:#2d8a5e;background:#e8f5ef}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#091830;color:#fff;border-radius:50px;padding:11px 22px;font-size:13px;font-weight:600;z-index:3000;opacity:0;pointer-events:none;transition:transform .25s,opacity .25s;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Blobs */
.blob-n{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(13,33,69,0.09) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.blob-g{position:absolute;width:440px;height:440px;background:radial-gradient(circle,rgba(45,138,94,0.07) 0%,transparent 70%);bottom:-60px;left:-80px;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}

/* Fade up */
.fu{opacity:0;transform:translateY(18px);animation:fu .45s ease forwards}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
.fu-1{animation-delay:.05s}.fu-2{animation-delay:.12s}.fu-3{animation-delay:.19s}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px}

/* Pull-to-refresh */
.ptr-indicator{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-56px);z-index:190;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #e2e8f0;border-radius:50px;padding:8px 18px 8px 12px;box-shadow:0 6px 24px rgba(13,33,69,0.10);font-size:13px;font-weight:600;color:#0d2145;opacity:0;pointer-events:none;transition:transform .28s cubic-bezier(.34,1.4,.64,1),opacity .22s ease;white-space:nowrap}
.ptr-indicator.ptr-pulling{transform:translateX(-50%) translateY(8px);opacity:1}
.ptr-indicator.ptr-loading{transform:translateX(-50%) translateY(8px);opacity:1}
.ptr-spinner{width:18px;height:18px;border:2.5px solid rgba(45,138,94,0.20);border-top-color:#2d8a5e;border-radius:50%;animation:ptr-spin .7s linear infinite;flex-shrink:0}
@keyframes ptr-spin{to{transform:rotate(360deg)}}

/* Swipe hint */
.swipe-hint{position:fixed;top:0;left:0;width:4px;height:100%;background:linear-gradient(to right,rgba(45,138,94,0.35),transparent);z-index:350;opacity:0;pointer-events:none;transition:opacity .18s}
.swipe-hint.active{opacity:1}

/* Stats grid — stacks to 1-col on very small screens */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:380px){.stats-grid{grid-template-columns:1fr!important;gap:8px}}

/* Modal detail grid — 1 col on mobile, 2 col on wider */
.detail-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:480px){.detail-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1024px){
  #sidebar{display:flex!important}
  #hamburger{display:none!important}
  #main-wrap{margin-left:248px}
  #contracts-grid{grid-template-columns:1fr 1fr!important}
  .modal-box{border-radius:24px;margin:auto;padding:36px 40px 40px}
  .modal{align-items:center;padding:20px}
}
@media(min-width:768px){
  #page-content{padding:32px!important}
  .search-wrap{width:auto!important;max-width:240px!important}
  .contract-card{padding:24px!important}
}
</style>

<style id="mobile-first-patch">
/* ═══════════════════════════════════════════════════
   KREDDLO GLOBAL MOBILE-FIRST PATCH
   Fixes: overflow, stat cards, hamburger, sidebar,
   loading overlay, products grid, bottom sheet
═══════════════════════════════════════════════════ */

/* 1. ROOT OVERFLOW FIX — kills horizontal scroll/blank sides */
html, body {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  box-sizing: border-box;
}
*, *::before, *::after { box-sizing: border-box; }

/* 2. MAIN WRAP — never wider than viewport */
#main-wrap {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

/* 3. PAGE CONTENT — proper mobile padding, no bleed */
#page-content {
  padding: 18px 16px !important;
  width: 100% !important;
  max-width: 100% !important;
  overflow-x: hidden;
}
@media (min-width: 1024px) {
  #main-wrap { width: auto; max-width: none; }
  #page-content { padding: 32px !important; width: auto !important; max-width: 100% !important; }
}

/* 4. STAT CARDS — mobile font scaling so text fits */
@media (max-width: 400px) {
  .stat-val { font-size: 22px !important; letter-spacing: -0.5px !important; }
  .stat-lbl { font-size: 10px !important; letter-spacing: 1px !important; }
  .stat-card { padding: 16px 14px !important; }
  .badge { font-size: 10px !important; padding: 2px 8px !important; }
}
@media (min-width: 401px) and (max-width: 767px) {
  .stat-val { font-size: 26px !important; }
  .stat-card { padding: 18px 16px !important; }
}

/* 5. STAT GRID — 2-col always on mobile, min 0 to prevent overflow */
#section-c > div, #stats-grid > div, #summary-cards > div {
  min-width: 0;
}
.stat-card { min-width: 0; }

/* 6. HAMBURGER — always visible on mobile, proper tap size */
#hamburger {
  display: flex !important;
  width: 44px !important;
  height: 44px !important;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  -webkit-tap-highlight-color: rgba(13,33,69,0.08);
  border-radius: 10px;
}
@media (min-width: 1024px) {
  #hamburger { display: none !important; }
}

/* 7. TOPBAR — full width, no overflow */
header {
  width: 100% !important;
  max-width: 100% !important;
  padding: 0 14px !important;
}
header h1 {
  font-size: 16px !important;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}
header > div:last-child {
  flex-shrink: 0;
  gap: 6px !important;
}

/* 8. MOBILE MENU — full height with safe area, slides from RIGHT */
#mobile-menu {
  right: 0 !important;
  left: auto !important;
  height: 100% !important;
  height: 100dvh !important;
  max-height: 100dvh !important;
  transform: translateX(100%) !important;
  padding-top: max(30px, env(safe-area-inset-top)) !important;
  padding-bottom: max(20px, env(safe-area-inset-bottom)) !important;
}
#mobile-menu.open {
  transform: translateX(0) !important;
}

/* 9. LOADING OVERLAY — full screen properly */
#loading-overlay {
  position: fixed !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  min-height: 100dvh !important;
  padding: 0 20px !important;
  box-sizing: border-box !important;
}

/* 10. PRODUCTS GRID — single col mobile */
#products-grid, #products-grid-sk {
  grid-template-columns: 1fr !important;
  width: 100% !important;
}
@media (min-width: 600px) {
  #products-grid, #products-grid-sk {
    grid-template-columns: repeat(2, 1fr) !important;
  }
}
@media (min-width: 1024px) {
  #products-grid, #products-grid-sk {
    grid-template-columns: repeat(3, 1fr) !important;
  }
}

/* 11. PRODUCT CARDS — prevent overflow */
.prod-card { min-width: 0; width: 100%; }
.prod-title { word-break: break-word; }

/* 12. BOTTOM SHEET (create product modal) — mobile first */
.cp-overlay {
  padding: 0 !important;
  align-items: flex-end !important;
}
.cp-sheet {
  width: 100% !important;
  max-width: 100% !important;
  border-radius: 24px 24px 0 0 !important;
  max-height: 92dvh !important;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
@media (min-width: 600px) {
  .cp-overlay { align-items: center !important; padding: 20px !important; }
  .cp-sheet {
    max-width: 600px !important;
    border-radius: 24px !important;
    max-height: 90dvh !important;
  }
}

/* 13. QUICK CARDS — equal width, responsive */
.qcard {
  width: calc(33.333% - 8px) !important;
  min-width: 0 !important;
  padding: 12px 6px !important;
}
.qcard-lbl { font-size: 10px !important; }
@media (max-width: 360px) {
  .qcard { width: calc(33.333% - 6px) !important; padding: 10px 4px !important; }
  .qcard-icon { width: 34px !important; height: 34px !important; }
}

/* 14. SECTION HEADER WRAP (products page title + button) */
.fu.fu-1 > div { min-width: 0; }
#create-product-btn { flex-shrink: 0; white-space: nowrap; }
@media (max-width: 400px) {
  /* Stack the title+button on very small screens */
  .fu.fu-1[style*="justify-content:space-between"] {
    flex-direction: column !important;
    align-items: flex-start !important;
    gap: 14px !important;
  }
  #create-product-btn { width: 100% !important; }
}

/* 15. MODALS — full width on mobile */
.modal-box {
  width: calc(100vw - 32px) !important;
  max-width: 500px !important;
  max-height: 90dvh !important;
  overflow-y: auto !important;
  padding: 22px 18px !important;
}

/* 16. GLASS CARDS — no overflow */
.glass { min-width: 0; }

/* 17. PERIOD PILLS (earnings) — wrap and small on mobile */
.pill { padding: 8px 14px !important; font-size: 12px !important; }

/* 18. EARNINGS SUMMARY CARDS — single col mobile */
#summary-cards {
  grid-template-columns: 1fr !important;
}
@media (min-width: 768px) {
  #summary-cards { grid-template-columns: repeat(3, 1fr) !important; }
}

/* 19. PAYOUT TABLE — hide on mobile, show cards */
@media (max-width: 767px) {
  .payout-desktop { display: none !important; }
  .payout-mobile { display: block !important; }
}
@media (min-width: 768px) {
  .payout-desktop { display: table !important; }
  .payout-mobile { display: none !important; }
}

/* 20. TOAST — above safe area on mobile */
.toast {
  bottom: max(24px, env(safe-area-inset-bottom, 24px)) !important;
  max-width: calc(100vw - 32px) !important;
}

/* 21. NAV LINKS — prevent text overflow in sidebar */
.nav-link {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

</style>
</head>
<body>

<div id="loading-overlay" style="position:fixed;inset:0;z-index:9999;background:#f8f9fb;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;min-height:100dvh;padding:0 20px;overflow:hidden;">
  <div style="font-size:30px;font-weight:800;color:#0d2145;letter-spacing:-0.8px;">Kreddl<span style="color:#2d8a5e;">o</span></div>
  <div style="width:44px;height:3px;border-radius:2px;overflow:hidden;background:#e8eaf0;position:relative;">
    <div id="loader-bar" style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(to right,#2d8a5e,#3dbd7a);"></div>
  </div>
</div>
<style>

#loader-bar{animation:loaderSlide 1.1s ease-in-out infinite}

<div id="mobile-dim" class="dim" onclick="closeMobileMenu()" style="position:fixed;inset:0;z-index:400;background:rgba(9,24,48,0.58);"></div>

  </button>
  <div style="font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:36px;margin-top:2px;">Kreddl<span style="color:#3dbd7a;">o</span></div>
  <nav id="mobile-nav" style="flex:1;display:flex;flex-direction:column;gap:3px;"></nav>
  <button id="mb-signout" style="margin-top:20px;width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);border-radius:11px;padding:11px 15px;color:rgba(255,255,255,0.58);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s,color .2s;" onmouseover="this.style.background='rgba(255,255,255,0.10)';this.style.color='#fff'" onmouseout="this.style.background='rgba(255,255,255,0.06)';this.style.color='rgba(255,255,255,0.58)'">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Sign Out
  </button>

function buildNav(uid) {
  var cur = (window.location.pathname.split('/').pop() || 'dashboard.html');
  var html = NAV.map(function(n) {
    var href = n.href;
    if (n.label === 'Store' && uid) href = '/store.html?uid=' + uid;
    var active = cur === n.href.replace('/','') ? ' active' : '';
    return '<a href="'+href+'" class="nav-link'+active+'">'+n.icon+n.label+'</a>';
  }).join('');

  document.getElementById('desktop-nav').innerHTML = html;

// ============ MOBILE MENU ============
function openMobileMenu() {
  document.getElementById('mobile-menu').classList.add('open');
  document.getElementById('mobile-dim').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeMobileMenu() {
  document.getElementById('mobile-menu').classList.remove('open');
  document.getElementById('mobile-dim').classList.remove('open');
  document.body.style.overflow = '';
}

// ============ LOGOUT ============
function handleLogout() {
  if (window._auth) {
    window._auth.signOut().then(function(){ window.location.href = '/login.html'; });
  } else {
    window.location.href = '/login.html';
  }
}
document.getElementById('mb-signout').onclick = handleLogout;
document.getElementById('dt-signout').onclick = handleLogout;

// ============ TOAST ============
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

// ============ STATUS CONFIG ============
var STATUS_CONFIG = {
  awaiting_signatures: { label: 'Pending Signature', cls: 'badge-amber' },
  active:              { label: 'Active',             cls: 'badge-blue'  },
  completed:           { label: 'Completed',          cls: 'badge-green' },
  disputed:            { label: 'Disputed',           cls: 'badge-red'   },
  cancelled:           { label: 'Cancelled',          cls: 'badge-grey'  }
};

// ============ TAB SELECTION ============
function selectTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.pill[data-tab]').forEach(function(btn) {
    if (btn.dataset.tab === tab) {
      btn.classList.add('pill-active');
      btn.classList.remove('pill-inactive');
    } else {
      btn.classList.add('pill-inactive');
      btn.classList.remove('pill-active');
    }
  });
  renderContracts();
}

// ============ STATS ROW ============
function renderStats() {
  var total     = CONTRACTS.length;
  var pending   = CONTRACTS.filter(function(c){ return c.status === 'awaiting_signatures'; }).length;
  var active    = CONTRACTS.filter(function(c){ return c.status === 'active'; }).length;
  var completed = CONTRACTS.filter(function(c){ return c.status === 'completed'; }).length;

  var stats = [
    { label: 'Total Contracts', value: total,     icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0d2145" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' },
    { label: 'Active',          value: active,    icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a56db" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' },
    { label: 'Completed',       value: completed, icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2d8a5e" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>' }
  ];

  document.getElementById('stats-row').innerHTML = stats.map(function(s) {
    return '<div class="glass" style="padding:16px;border-radius:16px;">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'
      + s.icon
      + '<span style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(13,33,69,0.45);">'+s.label+'</span>'
      + '</div>'
      + '<p style="font-size:26px;font-weight:800;color:#0d2145;margin:0;letter-spacing:-0.8px;">'+s.value+'</p>'
      + '</div>';
  }).join('');
}

// ============ SIGNATURE STATUS HELPER ============
function sigStatus(signed) {
  if (signed) {
    return '<span class="sig-row"><span class="sig-check sig-done"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></span>Signed</span>';
  }
  return '<span class="sig-row"><span class="sig-check sig-pending"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>Awaiting</span>';
}

// ============ ACTION BUTTON HELPER ============
function buildCardAction(c) {
  var isFreelancer = DEMO_USER.role === 'freelancer';

  if (c.status === 'awaiting_signatures') {
    var iSigned = isFreelancer ? c.freelancerSigned : c.buyerSigned;
    if (!iSigned) {
      return '<button class="btn-green" style="width:100%;margin-top:14px;" onclick="event.stopPropagation();openSignModal(\''+c.id+'\')">'
        + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>'
        + 'Sign Contract</button>';
    }
    return '<p style="font-size:13px;font-weight:600;color:rgba(13,33,69,0.50);margin-top:14px;text-align:center;">Waiting for other party to sign</p>';
  }

  if (c.status === 'active') {
    return '<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;">'
      + '<button class="btn-secondary" style="flex:1;min-width:120px;" onclick="event.stopPropagation();viewContractPdf(\''+c.id+'\')">'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
      + 'View PDF</button>'
      + '<a href="/dashboard-projects.html" class="btn-primary" style="flex:1;min-width:120px;text-decoration:none;">'
      + 'Go to Project</a>'
      + '</div>';
  }

  if (c.status === 'completed') {
    return '<button class="btn-secondary" style="width:100%;margin-top:14px;" onclick="event.stopPropagation();viewContractPdf(\''+c.id+'\')">'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
      + 'Download Contract</button>';
  }

  return '';
}

// ============ RENDER CONTRACTS ============
function renderContracts() {
  var grid  = document.getElementById('contracts-grid');
  var empty = document.getElementById('empty-state');
  var searchTerm = document.getElementById('search-input').value.trim().toLowerCase();

  var filtered = CONTRACTS.filter(function(c) {
    if (currentTab === 'pending')   return c.status === 'awaiting_signatures';
    if (currentTab === 'active')    return c.status === 'active';
    if (currentTab === 'completed') return c.status === 'completed' || c.status === 'disputed' || c.status === 'cancelled';
    return true; // 'all'
  });

  if (searchTerm) {
    filtered = filtered.filter(function(c) {
      return (c.title + ' ' + c.counterparty).toLowerCase().indexOf(searchTerm) !== -1;
    });
  }

  if (filtered.length === 0) {
    grid.innerHTML = '';
    grid.style.display = 'none';
    var msgs = {
      all:       'No contracts yet. Contracts are created when a project starts.',
      pending:   'No contracts waiting for your signature.',
      active:    'No active contracts right now.',
      completed: 'No completed contracts yet.'
    };
    empty.innerHTML = '<div class="glass empty-state">'
      + '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(13,33,69,0.25)" stroke-width="1.5" stroke-linecap="round" style="margin:0 auto 16px;display:block;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>'
      + '<h3 style="font-size:16px;font-weight:700;color:#0d2145;margin:0 0 6px;">No contracts found</h3>'
      + '<p style="font-size:14px;font-weight:500;color:rgba(13,33,69,0.50);margin:0;">' + (msgs[currentTab]||msgs.all) + '</p>'
      + '</div>';
    empty.style.display = 'block';
    return;
  }

  grid.style.display = 'grid';
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(function(c) {
    var sc    = STATUS_CONFIG[c.status] || { label: c.status, cls: 'badge-grey' };
    var isPending = c.status === 'awaiting_signatures';

    return '<div class="glass contract-card" onclick="openContractModal(\''+c.id+'\')" tabindex="0" role="button" aria-label="View contract: '+c.title+'">'
      // Header row
      + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px;">'
      + '<div style="flex:1;min-width:0;">'
      + '<p class="contract-title">'+c.title+'</p>'
      + '<p style="font-size:12px;font-weight:500;color:rgba(13,33,69,0.45);margin:4px 0 0;">with '+c.counterparty+'</p>'
      + '</div>'
      + '<span class="badge '+sc.cls+'">'+sc.label+'</span>'
      + '</div>'
      // Meta row
      + '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:12px 0;border-top:1px solid rgba(13,33,69,0.06);border-bottom:1px solid rgba(13,33,69,0.06);margin-bottom:12px;">'
      + '<div class="meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>'+c.amount+'</span></div>'
      + '<div class="meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>'+(c.createdDate||'—')+'</span></div>'
      + '</div>'
      // Signature status
      + (isPending ? '<div style="display:flex;gap:16px;margin-bottom:4px;">'
        + '<div><p class="lbl" style="margin:0 0 4px;">Freelancer</p>'+sigStatus(c.freelancerSigned)+'</div>'
        + '<div><p class="lbl" style="margin:0 0 4px;">Buyer</p>'+sigStatus(c.buyerSigned)+'</div>'
        + '</div>' : '')
      // Action
      + buildCardAction(c)
      + '</div>';
  }).join('');
}

// ============ CONTRACT MODAL ============
function openContractModal(id) {
  var c = CONTRACTS.find(function(x){ return x.id === id; });
  if (!c) return;
  activeContractId = id;

  var sc = STATUS_CONFIG[c.status] || { label: c.status, cls: 'badge-grey' };

  var html = '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:20px;">'
    + '<div style="flex:1;min-width:0;">'
    + '<h3 style="font-size:18px;font-weight:800;color:#0d2145;margin:0 0 4px;line-height:1.3;">'+c.title+'</h3>'
    + '<p style="font-size:13px;font-weight:500;color:rgba(13,33,69,0.50);margin:0;">with '+c.counterparty+'</p>'
    + '</div>'
    + '<span class="badge '+sc.cls+'">'+sc.label+'</span>'
    + '</div>';

  // Key details
  html += '<div class="detail-grid" style="margin-bottom:20px;">'
    + detailCell('Contract Value', c.amount)
    + detailCell('Created', c.createdDate || '—')
    + detailCell('Deadline', c.deadline || '—')
    + detailCell('Currency', c.currency || 'USD')
    + '</div>';

  // Signature section
  html += '<div class="contract-section">'
    + '<p class="contract-section-title">Signatures</p>'
    + '<div style="display:flex;gap:16px;">'
    + '<div style="flex:1;background:#f8f9fb;border-radius:12px;padding:14px;"><p class="lbl" style="margin:0 0 6px;">Freelancer</p>'+sigStatus(c.freelancerSigned)+'</div>'
    + '<div style="flex:1;background:#f8f9fb;border-radius:12px;padding:14px;"><p class="lbl" style="margin:0 0 6px;">Buyer</p>'+sigStatus(c.buyerSigned)+'</div>'
    + '</div></div>';

  // Scope of work
  if (c.scope) {
    html += '<div class="contract-section">'
      + '<p class="contract-section-title">Scope of Work</p>'
      + '<div class="contract-clause highlight">'+c.scope+'</div>'
      + '</div>';
  }

  // Milestones
  if (c.milestones && c.milestones.length) {
    html += '<div class="contract-section"><p class="contract-section-title">Milestones</p>'
      + c.milestones.map(function(m) {
          return '<div class="contract-clause" style="display:flex;justify-content:space-between;align-items:center;gap:10px;">'
            + '<span>'+m.title+'</span>'
            + '<span style="font-weight:700;color:#0d2145;white-space:nowrap;">'+m.amount+'</span>'
            + '</div>';
        }).join('')
      + '</div>';
  }

  // Payment terms
  if (c.paymentTerms) {
    html += '<div class="contract-section">'
      + '<p class="contract-section-title">Payment Terms</p>'
      + '<div class="contract-clause">'+c.paymentTerms+'</div>'
      + '</div>';
  }

  // Revision policy
  if (c.revisions) {
    html += '<div class="contract-section">'
      + '<p class="contract-section-title">Revision Policy</p>'
      + '<div class="contract-clause">'+c.revisions+'</div>'
      + '</div>';
  }

  // Action buttons
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;">';
  if (c.contractPdfUrl) {
    html += '<a href="'+c.contractPdfUrl+'" target="_blank" rel="noopener" class="btn-secondary" style="flex:1;min-width:120px;text-decoration:none;">'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
      + 'Download PDF</a>';
  }
  var isFreelancer = DEMO_USER.role === 'freelancer';
  var iSigned = isFreelancer ? c.freelancerSigned : c.buyerSigned;
  if (c.status === 'awaiting_signatures' && !iSigned) {
    html += '<button class="btn-green" style="flex:1;min-width:120px;" onclick="closeContractModal();openSignModal(\''+c.id+'\')">'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>'
      + 'Sign Contract</button>';
  }
  html += '<button class="btn-secondary" style="flex:1;min-width:120px;" onclick="closeContractModal()">Close</button>';
  html += '</div>';

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('contract-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function detailCell(label, value) {
  return '<div style="background:#f8f9fb;border-radius:12px;padding:12px 14px;">'
    + '<p class="lbl" style="margin:0 0 4px;">'+label+'</p>'
    + '<p style="font-size:14px;font-weight:700;color:#0d2145;margin:0;">'+value+'</p>'
    + '</div>';
}

function closeContractModal() {
  document.getElementById('contract-modal').classList.remove('open');
  document.body.style.overflow = '';
  activeContractId = null;
}

// ============ SIGN MODAL ============
function openSignModal(id) {
  var c = CONTRACTS.find(function(x){ return x.id === id; });
  if (!c) return;
  pendingSignContractId = id;
  document.getElementById('sign-modal-title').textContent = c.title;
  document.getElementById('sign-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSignModal() {
  document.getElementById('sign-modal').classList.remove('open');
  document.body.style.overflow = '';
  pendingSignContractId = null;
}

async function confirmSign() {
  if (!pendingSignContractId) return;
  var btn = document.getElementById('sign-confirm-btn');
  btn.disabled = true;
  btn.innerHTML = '<span style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:ptr-spin .65s linear infinite;display:inline-block;"></span> Signing...';

  try {
    var c    = CONTRACTS.find(function(x){ return x.id === pendingSignContractId; });
    var role = DEMO_USER.role === 'freelancer' ? 'freelancer' : 'buyer';

    var res = await fetch('/.netlify/functions/sign-contract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (auth.currentUser ? await auth.currentUser.getIdToken() : '') },
      body: JSON.stringify({
        contractId: pendingSignContractId,
        role:       role,
        ip:         '',
      }),
    });

    var json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Signing failed');

    // Optimistic local update
    if (c) {
      if (role === 'freelancer') c.freelancerSigned = true;
      else                       c.buyerSigned      = true;
      if (json.bothSigned) {
        c.status         = 'active';
        c.contractPdfUrl = json.contractPdfUrl || null;
      }
    }

    closeSignModal();
    renderContracts();
    renderStats();
    showToast(json.bothSigned ? 'Both parties signed — contract is now active!' : 'Contract signed successfully');
  } catch(err) {
    console.error('[confirmSign]', err);
    showToast(err.message || 'Could not sign. Please try again.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Sign Now';
  }
}

// ============ VIEW / DOWNLOAD PDF ============
function viewContractPdf(id) {
  var c = CONTRACTS.find(function(x){ return x.id === id; });
  if (!c) return;
  if (c.contractPdfUrl) {
    window.open(c.contractPdfUrl, '_blank');
    return;
  }
  if (!DEMO_USER.uid) { showToast('Not signed in'); return; }
  var url = '/.netlify/functions/download-contract?contractId=' + encodeURIComponent(id)
          + '&uid=' + encodeURIComponent(DEMO_USER.uid);
  window.open(url, '_blank');
}

// ============ LOAD CONTRACTS FROM FIRESTORE ============
async function loadContracts(uid) {
  try {
    var q = window._fsQuery;
    var isF = DEMO_USER.role === 'freelancer';

    // Query as freelancer OR buyer
    var snap = await q.getDocs(
      q.query(
        q.collection(window.db, 'contracts'),
        q.where(isF ? 'freelancerUid' : 'buyerUid', '==', uid),
        q.orderBy('createdAt', 'desc')
      )
    );

    CONTRACTS = snap.docs.map(function(d) {
      var data = d.data();
      function fmtDate(ts) {
        if (!ts) return '—';
        var dt = ts.toDate ? ts.toDate() : new Date(ts);
        return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      }
      return {
        id:               d.id,
        title:            data.title            || 'Untitled Contract',
        counterparty:     isF
          ? (data.buyerName  || data.buyerEmail  || 'Client')
          : (data.freelancerName || data.freelancerEmail || 'Freelancer'),
        amount:           data.currency
          ? (data.currency + ' ' + (data.amount || '—'))
          : ('$' + (data.amount || '—')),
        currency:         data.currency         || 'USD',
        status:           data.status           || 'awaiting_signatures',
        freelancerSigned: data.freelancerSigned || false,
        buyerSigned:      data.buyerSigned      || false,
        contractPdfUrl:   data.contractPdfUrl   || null,
        createdDate:      fmtDate(data.createdAt),
        deadline:         fmtDate(data.deadline),
        scope:            data.scope            || null,
        milestones:       data.milestones       || [],
        paymentTerms:     data.paymentTerms     || null,
        revisions:        data.revisions        || null,
      };
    });
  } catch(err) {
    console.error('[loadContracts]', err);
    showToast('Could not load contracts. Pull down to refresh.');
  }

  renderStats();
  renderContracts();
  document.getElementById('loading-overlay').style.display = 'none';
}

// ============ BOOT ============
window._boot = function(user) {
  DEMO_USER.uid  = user.uid;
  DEMO_USER.name = user.displayName || user.email || 'User';
  DEMO_USER.role = user.role || 'freelancer'; // overridden by Firestore below

  var parts = DEMO_USER.name.trim().split(' ');
  document.getElementById('user-avatar').textContent =
    parts.length >= 2 ? parts[0][0]+parts[parts.length-1][0] : DEMO_USER.name.slice(0,2).toUpperCase();

  document.getElementById('bell-dot').style.display = 'block';

  // Fetch user role from Firestore, build the correct nav, then load contracts
  (async function() {
    try {
      var snap = await window._fsQuery.getDoc(window._fsQuery.doc(window.db, 'users', user.uid));
      if (snap.exists()) { DEMO_USER.role = snap.data().role || 'freelancer'; }
    } catch(e) { /* non-fatal, default to freelancer */ }
    NAV = (DEMO_USER.role === 'buyer') ? NAV_BUYER : NAV_FREELANCER;
    buildNav(user.uid);
    loadContracts(user.uid);
  })();
};
</script>

<!-- PULL-TO-REFRESH -->
<script>
(function(){
  var startY = 0, pulling = false, threshold = 64;
  var ind = document.getElementById('ptr-indicator');
  var lbl = document.getElementById('ptr-label');

  document.addEventListener('touchstart', function(e){
    if (window.scrollY === 0) startY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchmove', function(e){
    if (!startY) return;
    var dy = e.touches[0].clientY - startY;
    if (dy > 10 && window.scrollY === 0) {
      pulling = true;
      ind.classList.add('ptr-pulling');
      lbl.textContent = dy > threshold ? 'Release to refresh' : 'Pull to refresh';
    }
  }, { passive: true });

  document.addEventListener('touchend', function(){
    if (pulling) {
      pulling = false;
      ind.classList.remove('ptr-pulling');
      ind.classList.add('ptr-loading');
      lbl.textContent = 'Refreshing';
      startY = 0;
      setTimeout(function(){
        if (DEMO_USER.uid) loadContracts(DEMO_USER.uid);
        ind.classList.remove('ptr-loading');
      }, 1200);
    }
    startY = 0;
  });
})();
</script>
