[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."kyc-submit"]
  included_files = []


[functions."scheduled-subscriptions"]
  schedule = "0 0 * * *"

[functions."process-email-queue"]
  schedule = "*/5 * * * *"

