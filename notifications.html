<style>
*,*::before,*::after{box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8f9fb;color:#0d2145;margin:0;padding:0;-webkit-font-smoothing:antialiased}

/* Glass */
.glass{background:rgba(255,255,255,0.65);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.35);border-radius:20px;box-shadow:0 8px 32px rgba(13,33,69,0.08)}

/* Buttons */
.btn-green{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#2d8a5e;color:#fff;border:none;border-radius:50px;padding:9px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(45,138,94,0.28);transition:transform .15s,box-shadow .15s,background .15s}
.btn-green:hover{background:#236b49;transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,138,94,0.38)}
.btn-green:active{transform:translateY(0)}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:transparent;color:rgba(13,33,69,0.52);border:1.5px solid #e2e8f0;border-radius:50px;padding:8px 18px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s}
.btn-ghost:hover{border-color:#0d2145;color:#0d2145;background:rgba(13,33,69,0.04);transform:translateY(-1px)}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.badge-green{background:#e8f5ef;color:#2d8a5e}
.badge-blue{background:#e8f0fe;color:#1a56db}
.badge-amber{background:#fff3cd;color:#856404}
.badge-red{background:#fde8e8;color:#c81e1e}
.badge-grey{background:rgba(13,33,69,0.07);color:rgba(13,33,69,0.55)}
.badge-navy{background:rgba(13,33,69,0.08);color:#0d2145}

/* Label */
.lbl{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:rgba(13,33,69,0.48)}

/* Skeleton */
.sk{background:linear-gradient(90deg,#f0f2f6 25%,#e8eaf0 50%,#f0f2f6 75%);background-size:200% 100%;animation:sk 1.5s infinite linear;border-radius:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Nav */
.nav-link{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:11px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.52);text-decoration:none;transition:background .15s,color .15s;cursor:pointer;border:none;background:transparent;width:100%;text-align:left}
.nav-link:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.88)}
.nav-link.active{background:rgba(45,138,94,0.22);color:#fff;border-left:3px solid #3dbd7a;padding-left:10px}

/* Mobile menu */
.slide-in{transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.slide-in.open{transform:translateX(0)}
.dim{opacity:0;pointer-events:none;transition:opacity .28s}
.dim.open{opacity:1;pointer-events:all}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#091830;color:#fff;border-radius:50px;padding:11px 22px;font-size:13px;font-weight:600;z-index:3000;opacity:0;pointer-events:none;transition:transform .25s,opacity .25s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Blobs */
.blob-n{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(13,33,69,0.09) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.blob-g{position:absolute;width:440px;height:440px;background:radial-gradient(circle,rgba(45,138,94,0.07) 0%,transparent 70%);bottom:-60px;left:-80px;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}

/* Fade up */
.fu{opacity:0;transform:translateY(18px);animation:fu .45s ease forwards}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
.fu-1{animation-delay:.05s}.fu-2{animation-delay:.12s}.fu-3{animation-delay:.19s}

/* Notification item */
.notif-item{display:flex;gap:16px;padding:18px 20px;border-bottom:1px solid #e2e8f0;cursor:pointer;transition:background .15s;position:relative;text-decoration:none;color:inherit}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:rgba(13,33,69,0.025)}
.notif-item:active{background:rgba(13,33,69,0.04)}
.notif-item.unread{background:rgba(232,245,239,0.45)}
.notif-item.unread:hover{background:rgba(232,245,239,0.70)}

/* Timeline connector */
.notif-timeline{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:3px}
.notif-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:transform .15s}
.notif-item:hover .notif-dot{transform:scale(1.2)}
.notif-dot.unread{background:#2d8a5e;box-shadow:0 0 0 3px rgba(45,138,94,0.18)}
.notif-dot.read{background:#e2e8f0;border:1.5px solid #cbd5e1}
.notif-line{width:1.5px;flex:1;margin-top:6px;min-height:24px}
.notif-line.unread{background:linear-gradient(to bottom,rgba(45,138,94,0.35),rgba(45,138,94,0.05))}
.notif-line.read{background:#f0f2f6}

/* Content */
.notif-content{flex:1;min-width:0}
.notif-title{font-size:14px;line-height:1.4;margin:0 0 4px;word-break:break-word}
.notif-title.unread{font-weight:700;color:#0d2145}
.notif-title.read{font-weight:500;color:rgba(13,33,69,0.72)}
.notif-body{font-size:13px;font-weight:400;color:rgba(13,33,69,0.52);line-height:1.55;margin:0 0 6px;word-break:break-word}
.notif-time{font-size:11px;font-weight:500;color:rgba(13,33,69,0.38);display:flex;align-items:center;gap:5px}
.notif-time.unread{color:rgba(45,138,94,0.80)}

/* Category pill on notification */
.notif-type{display:inline-flex;align-items:center;padding:2px 8px;border-radius:50px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}

/* Filter tabs */
.filter-tab{padding:7px 16px;border-radius:50px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.filter-tab.active{background:#0d2145;color:#fff;border-color:#0d2145}
.filter-tab:not(.active){background:transparent;color:rgba(13,33,69,0.52);border-color:#e2e8f0}
.filter-tab:not(.active):hover{border-color:#0d2145;color:#0d2145}

/* Responsive */
@media(min-width:1024px){
  #sidebar{display:flex!important}
  #hamburger{display:none!important}
  #main-wrap{margin-left:248px}
}
@media(min-width:768px){
  #page-content{padding:32px!important}
}
</style>
</head>

function buildNav(role) {
  const links = NAV_LINKS[role] || NAV_LINKS.freelancer;
  const current = window.location.pathname.split('/').pop() || 'dashboard.html';
  const html = links.map(l => {
    const isActive = current === l.href || current === '' && l.href === 'dashboard.html';
    return `<a href="${l.href}" class="nav-link${isActive?' active':''}">${l.icon}<span>${l.label}</span></a>`;
  }).join('');
  document.getElementById('desktop-nav').innerHTML = html;
  document.getElementById('mobile-nav').innerHTML = html;
}

// в”Ђв”Ђв”Ђ RELATIVE TIME в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function relTime(ts) {
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return 'Just now';
  if (diff < 3600) return `${Math.floor(diff/60)} min ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)} hr ago`;
  if (diff < 172800) return 'Yesterday';
  const days = Math.floor(diff/86400);
  if (days < 7) return `${days} days ago`;
  return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

// в”Ђв”Ђв”Ђ RENDER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let currentFilter = 'all';
let notifications = [...DEMO_NOTIFICATIONS];

function getFiltered() {
  if (currentFilter === 'all') return notifications;
  if (currentFilter === 'unread') return notifications.filter(n => !n.read);
  return notifications.filter(n => n.type === currentFilter);
}

function renderNotifications() {
  const list = document.getElementById('notif-list');
  const empty = document.getElementById('notif-empty');
  const filterEmpty = document.getElementById('notif-filter-empty');
  const filtered = getFiltered();
  const unreadCount = notifications.filter(n => !n.read).length;

  // Update count label
  const countLabel = document.getElementById('notif-count-label');
  countLabel.textContent = unreadCount > 0 ? `${unreadCount} unread` : 'No unread notifications';

  // Toggle mark all button visibility
  const markAllBtn = document.getElementById('mark-all-btn');
  markAllBtn.style.display = unreadCount > 0 ? 'inline-flex' : 'none';

  // Toggle bell dot
  const bellDot = document.getElementById('bell-dot');
  bellDot.style.display = unreadCount > 0 ? 'block' : 'none';

  if (notifications.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'block';
    filterEmpty.style.display = 'none';
    return;
  }

  if (filtered.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'none';
    filterEmpty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  filterEmpty.style.display = 'none';
  list.style.display = 'block';

  list.innerHTML = filtered.map((n, i) => {
    const type = TYPE_CONFIG[n.type] || TYPE_CONFIG.account;
    const isLast = i === filtered.length - 1;
    const readClass = n.read ? 'read' : 'unread';

    return `
    <div class="notif-item ${readClass}" onclick="handleNotifClick('${n.id}', '${n.url || ''}')">
      <div class="notif-timeline">
        <div class="notif-dot ${readClass}"></div>
        ${!isLast ? `<div class="notif-line ${readClass}"></div>` : ''}
      </div>
      <div class="notif-content">
        <div style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:50px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;background:${type.bg};color:${type.color};margin-bottom:5px;">${type.label}</div>
        <p class="notif-title ${readClass}">${n.title}</p>
        <p class="notif-body">${n.body}</p>
        <div class="notif-time ${readClass}">
          ${!n.read ? `<svg width="8" height="8" viewBox="0 0 24 24" fill="#2d8a5e"><circle cx="12" cy="12" r="10"/></svg>` : `<svg width="8" height="8" viewBox="0 0 24 24" fill="rgba(13,33,69,0.25)"><circle cx="12" cy="12" r="10"/></svg>`}
          ${relTime(n.createdAt)}
        </div>
      </div>
    </div>`;
  }).join('');
}

function handleNotifClick(id, url) {
  // Mark as read
  const notif = notifications.find(n => n.id === id);
  if (notif && !notif.read) {
    notif.read = true;
    // In production: update Firestore doc
    renderNotifications();
  }
  // Navigate if URL
  if (url) {
    setTimeout(() => { window.location.href = url; }, 100);
  }
}

function markAllAsRead() {
  const unreadExists = notifications.some(n => !n.read);
  if (!unreadExists) return;
  notifications.forEach(n => n.read = true);
  // In production: Firestore batch write setting read=true on all unread docs
  renderNotifications();
  showToast('All notifications marked as read');
}

function filterNotifs(type, btn) {
  currentFilter = type;
  // Update tab styling
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderNotifications();
}
