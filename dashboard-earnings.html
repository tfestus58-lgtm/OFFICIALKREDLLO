<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0d2145" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Kreddlo" />
<link rel="apple-touch-icon" href="/assets/kreddlo-192.png" />
<title>Earnings — Kreddlo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        navy:'#0d2145','navy-deep':'#091830','navy-mid':'#162f5e',
        green:'#2d8a5e','green-light':'#3dbd7a','green-pale':'#e8f5ef',
        cream:'#f8f9fb',border:'#e2e8f0'
      },
      fontFamily: { sans: ['Plus Jakarta Sans','sans-serif'] }
    }
  }
};
</script>
<style>
*,*::before,*::after{box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8f9fb;color:#0d2145;margin:0;padding:0;-webkit-font-smoothing:antialiased}

/* Glass */
.glass{background:rgba(255,255,255,0.65);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.35);border-radius:20px;box-shadow:0 8px 32px rgba(13,33,69,0.08)}

/* Buttons */
.btn-green{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#2d8a5e;color:#fff;border:none;border-radius:50px;padding:11px 24px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(45,138,94,0.30);transition:transform .15s,box-shadow .15s,background .15s}
.btn-green:hover{background:#236b49;transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,138,94,0.38)}
.btn-green:active{transform:translateY(0)}
.btn-green:focus-visible{outline:2px solid #3dbd7a;outline-offset:3px}
.btn-navy{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#0d2145;color:#fff;border:none;border-radius:50px;padding:11px 24px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(13,33,69,0.20);transition:transform .15s,box-shadow .15s,background .15s}
.btn-navy:hover{background:#162f5e;transform:translateY(-1px)}
.btn-navy:active{transform:translateY(0)}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:transparent;color:#0d2145;border:1.5px solid #e2e8f0;border-radius:50px;padding:10px 22px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:transform .15s,border-color .15s,background .15s}
.btn-outline:hover{border-color:#0d2145;background:rgba(13,33,69,0.04);transform:translateY(-1px)}
.btn-outline:focus-visible{outline:2px solid #2d8a5e;outline-offset:3px}

/* Period pills */
.pill{display:inline-flex;align-items:center;justify-content:center;padding:9px 20px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:background .15s,color .15s,transform .15s}
.pill-inactive{background:rgba(13,33,69,0.06);color:#0d2145}
.pill-inactive:hover{background:rgba(13,33,69,0.10);transform:translateY(-1px)}
.pill-active{background:#0d2145;color:#fff;box-shadow:0 4px 16px rgba(13,33,69,0.20)}
.pill:focus-visible{outline:2px solid #2d8a5e;outline-offset:2px}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:50px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.badge-green{background:#e8f5ef;color:#2d8a5e}
.badge-blue{background:#e8f0fe;color:#1a56db}
.badge-amber{background:#fff3cd;color:#856404}
.badge-red{background:#fde8e8;color:#c81e1e}
.badge-grey{background:rgba(13,33,69,0.07);color:rgba(13,33,69,0.55)}
.badge-navy{background:rgba(13,33,69,0.08);color:#0d2145}

/* Label */
.lbl{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:rgba(13,33,69,0.48)}

/* Skeleton */
.sk{background:linear-gradient(90deg,#f0f2f6 25%,#e8eaf0 50%,#f0f2f6 75%);background-size:200% 100%;animation:sk 1.5s infinite linear;border-radius:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Nav */
.nav-link{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:11px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.52);text-decoration:none;transition:background .15s,color .15s;cursor:pointer;border:none;background:transparent;width:100%;text-align:left}
.nav-link:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.88)}
.nav-link.active{background:rgba(45,138,94,0.22);color:#fff;border-left:3px solid #3dbd7a;padding-left:10px}

/* Stat card */
.stat-card{border-radius:20px;padding:22px;transition:box-shadow .2s,transform .2s;cursor:default}
.stat-card:hover{box-shadow:0 10px 40px rgba(13,33,69,0.13);transform:translateY(-2px)}
.stat-val{font-size:34px;font-weight:800;letter-spacing:-1px;line-height:1.1}
.stat-lbl{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:rgba(13,33,69,0.48);margin-top:5px}
.stat-trend{font-size:12px;font-weight:600;margin-top:9px;display:flex;align-items:center;gap:4px}

/* Mobile menu */
.slide-in{transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.slide-in.open{transform:translateX(0)}
.dim{opacity:0;pointer-events:none;transition:opacity .28s}
.dim.open{opacity:1;pointer-events:all}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#091830;color:#fff;border-radius:50px;padding:11px 22px;font-size:13px;font-weight:600;z-index:3000;opacity:0;pointer-events:none;transition:transform .25s,opacity .25s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Blobs */
.blob-n{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(13,33,69,0.09) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.blob-g{position:absolute;width:440px;height:440px;background:radial-gradient(circle,rgba(45,138,94,0.07) 0%,transparent 70%);bottom:-60px;left:-80px;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}

/* Fade up */
.fu{opacity:0;transform:translateY(18px);animation:fu .45s ease forwards}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
.fu-1{animation-delay:.05s}.fu-2{animation-delay:.12s}.fu-3{animation-delay:.19s}.fu-4{animation-delay:.26s}.fu-5{animation-delay:.33s}

/* Payout table - mobile cards */
.payout-card{padding:16px 20px;border-bottom:1px solid #f0f2f6}
.payout-card:last-child{border-bottom:none}
.payout-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.payout-row2{display:flex;justify-content:space-between;align-items:center}

/* Payout table - desktop */
.payout-table{width:100%;border-collapse:collapse}
.payout-table th{background:rgba(13,33,69,0.02);text-align:left;padding:12px 20px;font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:rgba(13,33,69,0.48)}
.payout-table td{padding:14px 20px;border-bottom:1px solid #f0f2f6;font-size:14px;font-weight:500;color:#0d2145}
.payout-table tr:hover td{background:rgba(13,33,69,0.012)}
.payout-table tr:last-child td{border-bottom:none}

/* Premium blur overlay */
.premium-blur{filter:blur(4px);pointer-events:none}
.premium-lock-wrap{position:relative}
.premium-lock-overlay{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;padding:20px}

/* Pull-to-refresh indicator */
.ptr-indicator{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-56px);z-index:190;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #e2e8f0;border-radius:50px;padding:8px 18px 8px 12px;box-shadow:0 6px 24px rgba(13,33,69,0.10);font-size:13px;font-weight:600;color:#0d2145;opacity:0;pointer-events:none;transition:transform .28s cubic-bezier(.34,1.4,.64,1),opacity .22s ease;white-space:nowrap}
.ptr-indicator.ptr-pulling{transform:translateX(-50%) translateY(8px);opacity:1}
.ptr-indicator.ptr-loading{transform:translateX(-50%) translateY(8px);opacity:1}
.ptr-spinner{width:18px;height:18px;border:2.5px solid rgba(45,138,94,0.20);border-top-color:#2d8a5e;border-radius:50%;animation:ptr-spin .7s linear infinite;flex-shrink:0}
@keyframes ptr-spin{to{transform:rotate(360deg)}}

/* Swipe-back left-edge glow */
.swipe-hint{position:fixed;top:0;left:0;width:4px;height:100%;background:linear-gradient(to right,rgba(45,138,94,0.35),transparent);z-index:350;opacity:0;pointer-events:none;transition:opacity .18s}
.swipe-hint.active{opacity:1}

/* Responsive */
@media(min-width:1024px){
  #sidebar{display:flex!important}
  #hamburger{display:none!important}
  #main-wrap{margin-left:248px}
}
@media(min-width:768px){
  #page-content{padding:32px!important}
  .stat-val{font-size:42px}
  #summary-cards{grid-template-columns:1fr 1fr 1fr!important}
  #premium-cards{grid-template-columns:1fr 1fr 1fr 1fr!important}
  .payout-mobile{display:none!important}
  .payout-desktop{display:table!important}
  #chart-canvas-wrap{height:260px!important}
}
@media(max-width:767px){
  .payout-desktop{display:none!important}
}
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loading-overlay" style="position:fixed;inset:0;z-index:9999;background:#f8f9fb;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;">
  <div style="font-size:30px;font-weight:800;color:#0d2145;letter-spacing:-0.8px;">Kreddl<span style="color:#2d8a5e;">o</span></div>
  <div style="width:44px;height:3px;border-radius:2px;overflow:hidden;background:#e8eaf0;position:relative;">
    <div id="loader-bar" style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(to right,#2d8a5e,#3dbd7a);"></div>
  </div>
</div>
<style>
@keyframes loaderSlide{0%{left:-100%}100%{left:100%}}
#loader-bar{animation:loaderSlide 1.1s ease-in-out infinite}

<!-- MOBILE BACKDROP -->
<div id="mobile-dim" class="dim" onclick="closeMobileMenu()" style="position:fixed;inset:0;z-index:400;background:rgba(9,24,48,0.58);"></div>

<!-- MOBILE MENU -->
<div id="mobile-menu" class="slide-in" style="position:fixed;top:0;right:0;width:272px;height:100%;background:#091830;z-index:500;padding:30px 22px;display:flex;flex-direction:column;overflow-y:auto;">
  <button onclick="closeMobileMenu()" style="position:absolute;top:18px;right:18px;width:34px;height:34px;background:rgba(255,255,255,0.08);border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;" onmouseover="this.style.background='rgba(255,255,255,0.14)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <div style="font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:36px;margin-top:2px;">Kreddl<span style="color:#3dbd7a;">o</span></div>
  <nav id="mobile-nav" style="flex:1;display:flex;flex-direction:column;gap:3px;"></nav>
  <button id="mb-signout" style="margin-top:20px;width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);border-radius:11px;padding:11px 15px;color:rgba(255,255,255,0.58);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s,color .2s;" onmouseover="this.style.background='rgba(255,255,255,0.10)';this.style.color='#fff'" onmouseout="this.style.background='rgba(255,255,255,0.06)';this.style.color='rgba(255,255,255,0.58)'">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Sign Out
  </button>
</div>

<!-- DESKTOP SIDEBAR -->
<aside id="sidebar" style="position:fixed;top:0;left:0;width:248px;height:100%;background:#091830;z-index:300;padding:30px 18px;display:none;flex-direction:column;overflow-y:auto;">
  <a href="/dashboard.html" style="font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.5px;text-decoration:none;display:block;margin-bottom:44px;">Kreddl<span style="color:#3dbd7a;">o</span></a>
  <nav id="desktop-nav" style="flex:1;display:flex;flex-direction:column;gap:3px;"></nav>
  <button id="dt-signout" style="margin-top:auto;width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);border-radius:11px;padding:11px 15px;color:rgba(255,255,255,0.58);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s,color .2s;" onmouseover="this.style.background='rgba(255,255,255,0.10)';this.style.color='#fff'" onmouseout="this.style.background='rgba(255,255,255,0.06)';this.style.color='rgba(255,255,255,0.58)'">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Sign Out
  </button>
</aside>

<!-- MAIN WRAPPER -->
<div id="main-wrap" style="min-height:100vh;display:flex;flex-direction:column;">

  <!-- TOPBAR -->
  <header style="position:sticky;top:0;z-index:200;height:64px;background:rgba(248,249,251,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;">
    <h1 style="font-size:17px;font-weight:800;color:#0d2145;letter-spacing:-0.3px;margin:0;">Earnings</h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <button onclick="window.location.href='/notifications.html'" style="position:relative;width:38px;height:38px;background:transparent;border:none;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;" onmouseover="this.style.background='rgba(13,33,69,0.06)'" onmouseout="this.style.background='transparent'">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#0d2145" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span id="bell-dot" style="display:none;position:absolute;top:7px;right:7px;width:8px;height:8px;background:#c81e1e;border-radius:50%;border:2px solid #f8f9fb;"></span>
      </button>
      <div id="user-avatar" style="width:35px;height:35px;background:linear-gradient(135deg,#2d8a5e,#3dbd7a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer;">MR</div>
      <button id="hamburger" onclick="openMobileMenu()" style="width:38px;height:38px;background:transparent;border:none;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;" onmouseover="this.style.background='rgba(13,33,69,0.06)'" onmouseout="this.style.background='transparent'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0d2145" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <main id="page-content" style="flex:1;padding:22px 18px;max-width:1200px;width:100%;margin:0 auto;position:relative;">
    <div class="blob-n"></div>
    <div class="blob-g"></div>
    <div style="position:relative;z-index:1;">

        <button class="pill pill-inactive" data-period="3m" onclick="selectPeriod('3m')">3 Months</button>
        <button class="pill pill-inactive" data-period="12m" onclick="selectPeriod('12m')">12 Months</button>
      </div>

      <!-- SECTION B: Summary stat cards -->

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <div style="width:38px;height:38px;background:rgba(45,138,94,0.12);border-radius:11px;display:flex;align-items:center;justify-content:center;">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#2d8a5e" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <span class="badge badge-green">Earned</span>
          </div>
          <div id="card-earned" class="stat-val sk" style="color:#2d8a5e;height:42px;width:60%;"></div>
          <div class="stat-lbl">Total Earned</div>
          <div id="trend-earned" class="stat-trend" style="color:#2d8a5e;visibility:hidden;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
            <span></span>
          </div>
        </div>

        <div class="stat-card" style="background:linear-gradient(135deg,rgba(13,33,69,0.04),rgba(255,255,255,0.85));border:1px solid rgba(255,255,255,0.55);box-shadow:0 4px 24px rgba(13,33,69,0.06);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <div style="width:38px;height:38px;background:rgba(13,33,69,0.07);border-radius:11px;display:flex;align-items:center;justify-content:center;">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0d2145" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </div>
            <span class="badge badge-navy">Withdrawn</span>
          </div>

            <span></span>

        <div class="stat-card" style="background:linear-gradient(135deg,rgba(133,100,4,0.05),rgba(255,255,255,0.85));border:1px solid rgba(133,100,4,0.12);box-shadow:0 4px 24px rgba(13,33,69,0.06);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <div style="width:38px;height:38px;background:rgba(133,100,4,0.10);border-radius:11px;display:flex;align-items:center;justify-content:center;">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#856404" stroke-width="2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            </div>
            <span class="badge badge-amber">Available</span>
          </div>
          <div id="card-pending" class="stat-val sk" style="color:#856404;height:42px;width:60%;"></div>

// ============ PERIOD FILTER HELPERS ============
function periodToDays(period) {
  if (period === '30d') return 30;
  if (period === '3m')  return 90;

function filterByPeriod(items, dateKey, period) {
  var days = periodToDays(period);
  var cutoff = daysAgo(days);
  return items.filter(function(item) { return item[dateKey] >= cutoff; });
}

// ============ CHART GROUPING ============
function fmtDateShort(d) {
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}
function fmtMonthShort(d) {
  return d.toLocaleDateString('en-GB', { month:'short', year:'2-digit' });
}

function buildChartData(period) {
  var projectsInPeriod = filterByPeriod(DEMO_PROJECTS, 'completedAt', period);
  var labels = [];
  var data = [];

  if (period === '30d') {
    // group by day, last 30 days
    var buckets = {};
    for (var i = 29; i >= 0; i--) {
      var d = daysAgo(i);
      var key = d.toDateString();
      buckets[key] = { label: fmtDateShort(d), value: 0 };
    }
    projectsInPeriod.forEach(function(p) {
      var key = p.completedAt.toDateString();
      if (buckets[key]) buckets[key].value += p.netAmount;
    });
    Object.keys(buckets).forEach(function(k) {
      labels.push(buckets[k].label);
      data.push(buckets[k].value);
    });
  } else if (period === '3m') {
    // group by week, last ~13 weeks
    var weeks = 13;
    var weekBuckets = [];
    for (var w = weeks - 1; w >= 0; w--) {
      var start = daysAgo(w * 7 + 6);
      var end = daysAgo(w * 7);
      weekBuckets.push({ start: start, end: end, value: 0, label: fmtDateShort(start) });
    }
    projectsInPeriod.forEach(function(p) {
      for (var b = 0; b < weekBuckets.length; b++) {
        if (p.completedAt >= weekBuckets[b].start && p.completedAt <= weekBuckets[b].end) {
          weekBuckets[b].value += p.netAmount;
          break;
        }
      }
    });
    weekBuckets.forEach(function(b) {
      labels.push(b.label);
      data.push(b.value);
    });
  } else {
    // group by month, last 12 months
    var monthBuckets = [];
    var now = new Date();
    for (var m = 11; m >= 0; m--) {
      var monthDate = new Date(now.getFullYear(), now.getMonth() - m, 1);
      monthBuckets.push({ year: monthDate.getFullYear(), month: monthDate.getMonth(), value: 0, label: fmtMonthShort(monthDate) });
    }
    projectsInPeriod.forEach(function(p) {
      var py = p.completedAt.getFullYear();
      var pm = p.completedAt.getMonth();
      for (var b = 0; b < monthBuckets.length; b++) {
        if (monthBuckets[b].year === py && monthBuckets[b].month === pm) {
          monthBuckets[b].value += p.netAmount;
          break;
        }
      }
    });
    monthBuckets.forEach(function(b) {
      labels.push(b.label);
      data.push(b.value);
    });
  }

  return { labels: labels, data: data };
}

// ============ RENDER CHART ============
function renderChart(period) {

        borderColor: '#2d8a5e',

        backgroundColor: gradient,
        fill: true,
        tension: 0.4,

// ============ EXPORT CSV ============
function exportCSV() {
  var rows = [['Date','Amount USD','Amount Crypto','Currency','Wallet','Status']];
  DEMO_PAYOUTS.forEach(function(p) {
    var dateStr = p.date.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    var cryptoStr = p.currency === 'USDT' ? p.amountCrypto.toFixed(2) : p.amountCrypto.toFixed(4);
    rows.push([dateStr, p.amountUsd, cryptoStr, p.currency, p.wallet, p.status]);
  });
  var csv = rows.map(function(r) {
    return r.map(function(cell) {
      var s = String(cell);
      if (s.indexOf(',') !== -1) return '"'+s+'"';
      return s;
    }).join(',');
  }).join('\n');

  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'kreddlo-payout-history.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Payout history exported');
}

    renderPayouts();
    renderPremiumSection();
  }
}

(function initPullToRefresh() {
  var touchStartY   = 0;
  var touchStartX   = 0;
  var isPulling     = false;
  var PTR_THRESHOLD = 80;
  var indicator     = document.getElementById('ptr-indicator');
  var label         = document.getElementById('ptr-label');
  var _ptrCooldown  = false;

  document.addEventListener('touchstart', function(e) {
    touchStartY = e.touches[0].clientY;
    touchStartX = e.touches[0].clientX;
    isPulling   = false;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (_ptrCooldown) return;
    var dy = e.touches[0].clientY - touchStartY;
    var dx = Math.abs(e.touches[0].clientX - touchStartX);
    // Only activate when at the very top, pulling down, not scrolling sideways
    if (window.scrollY < 10 && dy > 30 && dx < 60) {
      isPulling = true;
      label.textContent = dy > PTR_THRESHOLD ? 'Release to refresh' : 'Pull to refresh';
      indicator.classList.add('ptr-pulling');
    }
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!isPulling) return;
    isPulling = false;
    var dy = e.changedTouches[0].clientY - touchStartY;

    if (window.scrollY < 10 && dy > PTR_THRESHOLD) {
      _ptrCooldown = true;
      label.textContent = 'Refreshing';
      indicator.classList.remove('ptr-pulling');
      indicator.classList.add('ptr-loading');

      // Haptic pulse on trigger
      try { navigator.vibrate && navigator.vibrate([30, 40, 30]); } catch(err) {}

      var result = refreshPageData();
      var done = function() {
        indicator.classList.remove('ptr-loading');
        setTimeout(function() {
          _ptrCooldown = false;
          showToast('Earnings refreshed');
        }, 300);
      };
      if (result && typeof result.then === 'function') {
        result.then(done).catch(done);
      } else {
        setTimeout(done, 800);
      }
    } else {
      indicator.classList.remove('ptr-pulling');
    }
  }, { passive: true });
})();

// ============ STEP 18B: HAPTIC FEEDBACK ON CONFIRM / APPROVE BUTTONS ============
(function initHaptic() {
  // Delegation on document covers any dynamically injected buttons too
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('button, [role="button"]');
    if (!btn) return;
    var txt = (btn.textContent || '').trim().toLowerCase();
    if (/^(confirm|approve|upgrade to pro)/.test(txt)) {
      try { navigator.vibrate && navigator.vibrate(50); } catch(err) {}
    }
  }, { passive: true });
})();

// ============ STEP 18C: SWIPE TO GO BACK ============
(function initSwipeBack() {
  var touchStartX  = 0;
  var touchStartY  = 0;
  var EDGE_ZONE    = 30;
  var SWIPE_MIN_DX = 60;
  var hint         = document.getElementById('swipe-hint');
  var isEdgeSwipe  = false;

  document.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isEdgeSwipe = touchStartX < EDGE_ZONE;
    if (isEdgeSwipe) hint.classList.add('active');
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!isEdgeSwipe) return;
    hint.classList.remove('active');

    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = Math.abs(e.changedTouches[0].clientY - touchStartY);

    if (dx > SWIPE_MIN_DX && dy < dx * 0.6) {
      // Close mobile menu if open instead of navigating away
      if (document.getElementById('mobile-menu').classList.contains('open')) {
        closeMobileMenu();
        isEdgeSwipe = false;
        return;
      }
      try { navigator.vibrate && navigator.vibrate(30); } catch(err) {}
      window.history.back();
    }
    isEdgeSwipe = false;
  }, { passive: true });

  document.addEventListener('touchcancel', function() {
    hint.classList.remove('active');
    isEdgeSwipe = false;
  }, { passive: true });
})();

// ============ ESCAPE KEY ============
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeMobileMenu();
});

// ============ LOAD EARNINGS DATA FROM FIRESTORE ============
async function loadEarningsData(uid) {
  if (!window.db || !window._fsQ) return;
  var fsQ = window._fsQ;

  try {
    // ── Query 1: completed projects (freelancer side) ──
    var q1 = fsQ.query(
      fsQ.collection(window.db, 'projects'),
      fsQ.where('freelancerUid', '==', uid),
      fsQ.where('status', '==', 'completed')
    );
    var snap1 = await fsQ.getDocs(q1);
    var projectEarnings = snap1.docs.map(function(d) {
      var data = d.data();
      var ts = data.completedAt;
      return {
        netAmount:   data.netAmount || data.amount || 0,
        completedAt: ts ? (ts.toDate ? ts.toDate() : new Date(ts)) : new Date()
      };
    });

    // ── Query 2: paid product orders (seller side) ──
    var q2 = fsQ.query(
      fsQ.collection(window.db, 'product-orders'),
      fsQ.where('sellerUid', '==', uid),
      fsQ.where('paymentStatus', '==', 'paid')
    );
    var snap2 = await fsQ.getDocs(q2);
    var productEarnings = snap2.docs.map(function(d) {
      var data = d.data();
      var ts = data.deliveredAt || data.createdAt;
      return {
        netAmount:   data.sellerAmount || 0,
        completedAt: ts ? (ts.toDate ? ts.toDate() : new Date(ts)) : new Date()
      };
    });

    // Merge both into DEMO_PROJECTS (shape filterByPeriod already expects)
    DEMO_PROJECTS = projectEarnings.concat(productEarnings);

    // ── Query 3: payouts ──
    var q3 = fsQ.query(
      fsQ.collection(window.db, 'payouts'),
      fsQ.where('userUid', '==', uid),
      fsQ.orderBy('createdAt', 'desc')
    );
    var snap3 = await fsQ.getDocs(q3);
    DEMO_PAYOUTS = snap3.docs.map(function(d) {
      var data = d.data();
      var ts = data.createdAt;
      return {
        date:        ts ? (ts.toDate ? ts.toDate() : new Date(ts)) : new Date(),
        amountUsd:   data.amount       || 0,
        amountCrypto: data.amountCoin  || data.amount || 0,
        currency:    data.currency     || 'USDT',
        wallet:      data.walletAddress ? data.walletAddress.slice(0,6) + '...' + data.walletAddress.slice(-4) : '—',
        status:      data.status       || 'pending'
      };
    });

    // ── User doc: availableBalance + plan ──
    var userSnap = await fsQ.getDoc(fsQ.doc(window.db, 'users', uid));
    if (userSnap.exists()) {
      var ud = userSnap.data();
      DEMO.availableBalance = ud.availableBalance || 0;
      DEMO.premiumStatus    = ud.premiumStatus    || 'inactive';
      DEMO.plan             = ud.plan             || '';
    }

  } catch(err) {
    console.error('[loadEarningsData]', err);
    showToast('Could not load earnings data. Pull to refresh.');
  }

  renderSummaryCards(currentPeriod);
  renderChart(currentPeriod);
  renderPayouts();
  renderPremiumSection();
  document.getElementById('loading-overlay').style.display = 'none';
}

// ============ BOOT ============
window._boot = function(user) {
  DEMO.uid  = user.uid;
  DEMO.name = user.displayName || user.email || 'User';

  // Avatar initials
  var parts = DEMO.name.trim().split(' ');
  document.getElementById('user-avatar').textContent =
    parts.length >= 2 ? parts[0][0]+parts[parts.length-1][0] : DEMO.name.slice(0,2).toUpperCase();

  // Nav
  buildNav();

  // Bell dot
  document.getElementById('bell-dot').style.display = 'block';

  // Load real data from Firestore
  loadEarningsData(user.uid);
};
