<style>
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8f9fb;color:#0d2145;margin:0;padding:0;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── Variables ── */
:root{
  --navy:#0d2145;
  --navy-deep:#091830;
  --navy-mid:#162f5e;
  --green:#2d8a5e;
  --green-light:#3dbd7a;
  --green-pale:#e8f5ef;
  --cream:#f8f9fb;
  --border:#e2e8f0;
  --muted:rgba(13,33,69,0.48);
  --muted-light:rgba(13,33,69,0.32);
}

/* ── Navbar ── */
.nav{position:sticky;top:0;z-index:100;background:rgba(248,249,251,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;font-size:18px;font-weight:800;color:var(--navy);letter-spacing:-0.4px}
.nav-logo-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;margin-left:2px}
.nav-actions{display:flex;align-items:center;gap:10px}
.btn-login{background:transparent;border:1.5px solid var(--border);color:var(--navy);border-radius:50px;padding:8px 18px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:border-color .15s,background .15s}
.btn-login:hover{border-color:var(--navy);background:rgba(13,33,69,0.04)}
.btn-signup{background:var(--navy);color:#fff;border:none;border-radius:50px;padding:8px 18px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .15s,transform .15s}
.btn-signup:hover{background:var(--navy-mid);transform:translateY(-1px)}
.btn-get-started{background:var(--green);color:#fff;border:none;border-radius:50px;padding:9px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:background .15s,transform .15s;display:none}
.btn-get-started:hover{background:#236b49;transform:translateY(-1px)}

@media(max-width:640px){
  .nav-desktop-actions{display:none}
  .btn-get-started{display:inline-flex;align-items:center;justify-content:center}
}
@media(min-width:641px){
  .btn-get-started{display:none}
}

/* ── Page layout ── */
.page{max-width:1100px;margin:0 auto;padding:28px 16px 60px}

/* ── Two column ── */
.product-grid{display:grid;grid-template-columns:1fr;gap:24px}

@media(min-width:768px){
  .product-grid{grid-template-columns:60fr 40fr;align-items:start;gap:32px}
  /* On desktop: content left, card right (natural DOM order is card first for mobile) */
  .product-content{order:1}
  .purchase-col{order:2}
}

/* ── Cover image ── */
.cover-wrap{margin-bottom:20px}
.cover-img{width:100%;border-radius:16px;display:block;object-fit:cover;max-height:420px;background:#f0f2f6}
.cover-placeholder{width:100%;aspect-ratio:16/9;border-radius:16px;background:linear-gradient(135deg,rgba(13,33,69,0.06) 0%,rgba(45,138,94,0.09) 100%);display:flex;align-items:center;justify-content:center}

/* ── Seller row ── */
.seller-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.seller-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;background:#e2e8f0;flex-shrink:0;border:2px solid #fff;box-shadow:0 2px 8px rgba(13,33,69,0.12)}
.seller-avatar-init{width:40px;height:40px;border-radius:50%;background:var(--green-pale);color:var(--green);font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.seller-name{font-size:14px;font-weight:700;color:var(--navy)}
.badge-verified{display:inline-flex;align-items:center;gap:4px;background:#e8f5ef;color:#2d8a5e;border-radius:50px;padding:2px 9px;font-size:10px;font-weight:700;letter-spacing:.3px;margin-left:6px}

/* ── Product title & description ── */
.product-title{font-size:24px;font-weight:800;color:var(--navy);letter-spacing:-0.5px;margin:0 0 12px;line-height:1.25}
@media(min-width:768px){.product-title{font-size:32px}}
.product-desc{font-size:15px;font-weight:400;color:rgba(13,33,69,0.62);line-height:1.7;margin:0 0 28px;white-space:pre-wrap}

/* ── Purchase card ── */
.purchase-col{order:-1}/* mobile: card appears first */
@media(min-width:768px){.purchase-col{order:2;position:sticky;top:80px}}

.purchase-card{background:var(--green-pale);border:1.5px solid rgba(45,138,94,0.18);border-radius:20px;padding:24px;box-shadow:0 8px 32px rgba(45,138,94,0.10)}
@media(min-width:768px){.purchase-card{padding:28px}}

.price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px}
.price-amount{font-size:32px;font-weight:800;color:var(--green);letter-spacing:-1px;line-height:1}
.price-currency{font-size:14px;font-weight:600;color:var(--muted)}
.delivery-hint{font-size:13px;font-weight:500;color:var(--muted);margin:0 0 20px}

/* ── Input fields ── */
.input-field{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:var(--navy);outline:none;transition:border-color .15s,box-shadow .15s;margin-bottom:12px;display:block}
.input-field::placeholder{color:rgba(13,33,69,0.35);font-weight:400}
.input-field:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,138,94,0.12)}
.input-field.error{border-color:#e53e3e;box-shadow:0 0 0 3px rgba(229,62,62,0.10)}

/* ── Buy button ── */
.btn-buy{display:flex;align-items:center;justify-content:center;width:100%;background:var(--green);color:#fff;border:none;border-radius:50px;padding:15px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px rgba(45,138,94,0.32);transition:background .15s,transform .15s,box-shadow .15s;margin-top:4px;letter-spacing:-0.2px}
.btn-buy:hover{background:#236b49;transform:translateY(-2px);box-shadow:0 8px 28px rgba(45,138,94,0.38)}
.btn-buy:active{transform:translateY(0)}
.btn-buy:disabled{opacity:.65;pointer-events:none}
.btn-buy-spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Secure text ── */
.secure-text{font-size:12px;font-weight:500;color:var(--muted);text-align:center;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:5px}

/* ── Payment icons row ── */
.payment-icons{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.pay-icon{height:22px;opacity:.65}

/* ── Share row ── */
.share-row{display:flex;align-items:center;gap:10px;margin-top:20px}
.share-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}
.share-btn{width:36px;height:36px;border-radius:50%;background:rgba(13,33,69,0.06);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .15s;flex-shrink:0}
.share-btn:hover{background:rgba(13,33,69,0.12);transform:scale(1.08)}

/* ── Reviews section ── */
.reviews-section{margin-top:40px}
.reviews-heading{font-size:18px;font-weight:700;color:var(--navy);margin:0 0 6px}
.rating-summary{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.stars-display{display:flex;gap:2px}
.star-svg{width:16px;height:16px}
.rating-avg{font-size:20px;font-weight:800;color:var(--navy);letter-spacing:-0.5px}
.rating-count{font-size:13px;font-weight:500;color:var(--muted)}
.review-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:12px}
.review-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.review-avatar{width:36px;height:36px;border-radius:50%;background:var(--green-pale);color:var(--green);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.review-author{font-size:13px;font-weight:700;color:var(--navy)}
.review-date{font-size:11px;font-weight:500;color:var(--muted);margin-top:1px}
.review-stars{display:flex;gap:2px;margin-left:auto}
.review-text{font-size:13px;font-weight:400;color:rgba(13,33,69,0.65);line-height:1.65}
.empty-reviews{text-align:center;padding:36px 20px;color:var(--muted);font-size:14px;font-weight:500}

/* ── 404 / error state ── */
.not-found{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 20px;min-height:50vh}
.not-found-icon{margin-bottom:20px;opacity:.35}
.not-found h2{font-size:22px;font-weight:800;color:var(--navy);margin:0 0 8px}
.not-found p{font-size:14px;font-weight:500;color:var(--muted);margin:0}

/* ── Skeleton ── */
.sk{background:linear-gradient(90deg,#f0f2f6 25%,#e8eaf0 50%,#f0f2f6 75%);background-size:200% 100%;animation:sk 1.5s infinite linear;border-radius:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#091830;color:#fff;border-radius:50px;padding:11px 22px;font-size:13px;font-weight:600;z-index:3000;opacity:0;pointer-events:none;transition:transform .25s,opacity .25s;white-space:nowrap;max-width:calc(100vw - 40px);text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── Fade-up ── */
.fu{opacity:0;transform:translateY(16px);animation:fu .4s ease forwards}
.fu-1{animation-delay:.06s}.fu-2{animation-delay:.13s}.fu-3{animation-delay:.20s}
@keyframes fu{to{opacity:1;transform:translateY(0)}}

/* ── Loading skeleton layout ── */
.sk-cover{width:100%;aspect-ratio:16/9;border-radius:16px;margin-bottom:20px}
.sk-line{height:14px;margin-bottom:10px}
.sk-title{height:28px;width:75%;margin-bottom:14px}
.sk-para{height:12px;margin-bottom:8px}
.sk-para:last-child{width:60%}
.sk-card-inner{background:#fff;border-radius:20px;padding:24px}
.sk-price{height:36px;width:50%;margin-bottom:12px}
.sk-input{height:46px;border-radius:12px;margin-bottom:12px}
.sk-btn{height:52px;border-radius:50px;margin-top:8px}
</style>

<script>
// ── State ──────────────────────────────────────────
let _product = null;
let _productId = null;

// ── Toast ──────────────────────────────────────────
function showToast(msg, dur = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), dur);
}

// ── Stars helper ───────────────────────────────────
function renderStars(rating, size = 16) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    const full = i <= Math.floor(rating);
    const partial = !full && i === Math.ceil(rating) && rating % 1 > 0;
    const pct = partial ? Math.round((rating % 1) * 100) : (full ? 100 : 0);
    html += `<svg width="${size}" height="${size}" class="star-svg" viewBox="0 0 24 24">
      <defs><linearGradient id="sg${i}"><stop offset="${pct}%" stop-color="#f5a623"/><stop offset="${pct}%" stop-color="#e2e8f0"/></linearGradient></defs>
      <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="url(#sg${i})" stroke="none"/>
    </svg>`;
  }
  return html;
}

// ── Init ────────────────────────────────────────────
document.addEventListener('firebase-ready', async () => {
  const slug = new URLSearchParams(window.location.search).get('slug');
  if (!slug) { show404(); return; }

  try {
    const db = window._db;
    const { collection, query, where, getDocs } = window._fsQuery;

    const q = query(collection(db, 'products'), where('slug', '==', slug));
    const snap = await getDocs(q);

    if (snap.empty) { show404(); return; }

    const doc = snap.docs[0];
    _productId = doc.id;
    _product = { id: doc.id, ...doc.data() };

    if (_product.active === false) { show404(); return; }

    renderProduct(_product);
    loadReviews(_productId);
  } catch (e) {
    console.error(e);
    show404();
  }
});

// ── 404 ─────────────────────────────────────────────
function show404() {
  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('not-found').style.display = 'block';
}

// ── Render product ───────────────────────────────────
async function renderProduct(p) {
  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('product-root').style.display = 'grid';

  // ── SEO ──
  const sellerName = p.sellerName || 'Kreddlo Seller';
  document.title = `${p.title} — ${sellerName} | Kreddlo`;
  document.querySelector('meta[name="description"]').setAttribute('content', (p.description || '').slice(0, 155));
  document.querySelector('meta[property="og:title"]').setAttribute('content', `${p.title} — ${sellerName} | Kreddlo`);
  document.querySelector('meta[property="og:description"]').setAttribute('content', (p.description || '').slice(0, 155));
  if (p.coverImage) document.querySelector('meta[property="og:image"]').setAttribute('content', p.coverImage);

  // ── Cover image ──
  const coverWrap = document.getElementById('cover-wrap');
  if (p.coverImage) {
    coverWrap.innerHTML = `<img class="cover-img" src="${p.coverImage}" alt="${escHtml(p.title)}" loading="eager"/>`;
  } else {
    coverWrap.innerHTML = `<div class="cover-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(13,33,69,0.2)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>`;
  }

  // ── Seller row ──
  const sellerRow = document.getElementById('seller-row');
  const initials = sellerName.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const avatarEl = p.sellerPhoto
    ? `<img class="seller-avatar" src="${p.sellerPhoto}" alt="${escHtml(sellerName)}" loading="lazy"/>`
    : `<div class="seller-avatar-init">${initials}</div>`;
  const verifiedBadge = p.kycStatus === 'verified'
    ? `<span class="badge-verified"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#2d8a5e" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>Verified</span>`
    : '';
  sellerRow.innerHTML = `${avatarEl}<span class="seller-name">${escHtml(sellerName)}</span>${verifiedBadge}`;

  // ── Title & description ──
  document.getElementById('product-title').textContent = p.title || '';
  document.getElementById('product-desc').textContent = p.description || '';

  // ── Price ──
  const currency = (p.currency || 'USD').toUpperCase();
  const price = Number(p.price) || 0;
  document.getElementById('price-amount').textContent = `$${price.toLocaleString('en-US', {minimumFractionDigits: price % 1 !== 0 ? 2 : 0})}`;
  document.getElementById('price-currency').textContent = currency;
  document.getElementById('btn-buy-text').textContent = `Buy Now — $${price.toLocaleString('en-US', {minimumFractionDigits: price % 1 !== 0 ? 2 : 0})}`;

  // ── Delivery hint ──
  const hint = p.deliveryType === 'instant-auto'
    ? 'Delivered instantly after payment'
    : 'Seller responds within 24 hours';
  document.getElementById('delivery-hint').textContent = hint;

  // ── Payment icons ──
  renderPaymentIcons(p);

  // ── Facebook Pixel ──
  if (p.integrations && p.integrations.facebookPixelId) {
    injectFBPixel(p.integrations.facebookPixelId);
  }
}

// ── Payment icons ───────────────────────────────────
function renderPaymentIcons(p) {
  const container = document.getElementById('payment-icons');
  let html = '';

  const showStripe = p.stripeEnabled && !p.paystackEnabled;
  const showBoth = p.stripeEnabled && p.paystackEnabled;

  if (showStripe || showBoth || (!p.stripeEnabled && !p.paystackEnabled)) {
    // Card icons
    html += cardIcon('VISA') + cardIcon('MC') + cardIcon('AMEX');
  }

  if (p.cryptoEnabled) {
    html += `
      <svg class="pay-icon" viewBox="0 0 38 24" xmlns="http://www.w3.org/2000/svg" aria-label="Bitcoin">
        <rect width="38" height="24" rx="4" fill="#f7931a"/>
        <text x="19" y="16" text-anchor="middle" font-size="9" font-weight="800" fill="#fff" font-family="sans-serif">BTC</text>
      </svg>
      <svg class="pay-icon" viewBox="0 0 38 24" xmlns="http://www.w3.org/2000/svg" aria-label="Ethereum">
        <rect width="38" height="24" rx="4" fill="#627eea"/>
        <text x="19" y="16" text-anchor="middle" font-size="9" font-weight="800" fill="#fff" font-family="sans-serif">ETH</text>
      </svg>
      <svg class="pay-icon" viewBox="0 0 38 24" xmlns="http://www.w3.org/2000/svg" aria-label="USDT">
        <rect width="38" height="24" rx="4" fill="#26a17b"/>
        <text x="19" y="16" text-anchor="middle" font-size="9" font-weight="800" fill="#fff" font-family="sans-serif">USDT</text>
      </svg>`;
  }

  container.innerHTML = html;
}

function cardIcon(type) {
  const colors = { VISA: '#1a1f71', MC: '#eb001b', AMEX: '#007bc1' };
  const c = colors[type] || '#333';
  return `<svg class="pay-icon" viewBox="0 0 38 24" xmlns="http://www.w3.org/2000/svg" aria-label="${type}">
    <rect width="38" height="24" rx="4" fill="#f4f6f9" stroke="#e2e8f0" stroke-width="1"/>
    <text x="19" y="16" text-anchor="middle" font-size="${type === 'AMEX' ? 7 : 9}" font-weight="800" fill="${c}" font-family="sans-serif">${type}</text>
  </svg>`;
}

// ── Facebook Pixel ───────────────────────────────────
function injectFBPixel(pixelId) {
  if (window._fbPixelInjected) return;
  window._fbPixelInjected = true;
  const s = document.createElement('script');
  s.textContent = `!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init','${pixelId}');fbq('track','ViewContent',{content_name:'${escJs(_product ? _product.title : '')}',content_ids:['${escJs(_productId || '')}'],content_type:'product'});`;
  document.head.appendChild(s);
}

// ── Buy Now ──────────────────────────────────────────
async function handleBuyNow() {
  const nameEl = document.getElementById('buyer-name');
  const emailEl = document.getElementById('buyer-email');
  nameEl.classList.remove('error');
  emailEl.classList.remove('error');

  let valid = true;
  if (!nameEl.value.trim()) { nameEl.classList.add('error'); nameEl.focus(); valid = false; }
  if (!emailEl.value.trim() || !emailEl.value.includes('@')) { emailEl.classList.add('error'); if (valid) emailEl.focus(); valid = false; }
  if (!valid) { showToast('Please fill in all fields correctly.'); return; }

  const btn = document.getElementById('btn-buy');
  const spinner = document.getElementById('buy-spinner');
  const btnText = document.getElementById('btn-buy-text');
  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Processing…';

  // Fire pixel InitiateCheckout if configured
  if (_product && _product.integrations && _product.integrations.facebookPixelId && window.fbq) {
    try { fbq('track', 'InitiateCheckout', { content_ids: [_productId], content_type: 'product', value: _product.price, currency: _product.currency || 'USD' }); } catch(e){}
  }

  try {
    const res = await fetch('/.netlify/functions/create-product-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        productId: _productId,
        buyerEmail: emailEl.value.trim(),
        buyerName: nameEl.value.trim(),
        paymentMethod: 'crypto'
      })
    });

    const data = await res.json();

    if (!res.ok || !data.checkoutUrl) {
      throw new Error(data.error || 'Something went wrong. Please try again.');
    }

    window.location.href = data.checkoutUrl;
  } catch (err) {
    showToast(err.message || 'Payment failed. Please try again.');
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = `Buy Now — $${Number(_product.price).toLocaleString('en-US')}`;
  }
}

// ── Share helpers ─────────────────────────────────────
function shareTwitter() {
  const text = encodeURIComponent(`Check out ${_product ? _product.title : 'this product'}`);
  const url = encodeURIComponent(window.location.href);
  window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank', 'noopener');
}

function shareWhatsApp() {
  const title = _product ? _product.title : 'this product';
  const msg = encodeURIComponent(`Check out ${title} ${window.location.href}`);
  window.open(`whatsapp://send?text=${msg}`, '_blank');
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => showToast('Link copied!')).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = window.location.href;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Link copied!');
  });
}

// ── Reviews ───────────────────────────────────────────
async function loadReviews(productId) {
  const db = window._db;
  const { collection, query, where, getDocs, orderBy, limit } = window._fsQuery;

  try {
    const q = query(
      collection(db, 'reviews'),
      where('sourceId', '==', productId),
      orderBy('createdAt', 'desc'),
      limit(10)
    );
    const snap = await getDocs(q);
    const reviews = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderReviews(reviews);
  } catch(e) {
    console.warn('Reviews error:', e);
    renderReviews([]);
  }
}

function renderReviews(reviews) {
  const root = document.getElementById('reviews-root');
  const list = document.getElementById('reviews-list');
  const ratingSummary = document.getElementById('rating-summary');
  root.style.display = 'block';

  if (reviews.length === 0) {
    ratingSummary.innerHTML = '';
    list.innerHTML = `<div class="empty-reviews">Be the first to leave a review</div>`;
    return;
  }

  const avg = reviews.reduce((s, r) => s + (r.rating || 0), 0) / reviews.length;
  ratingSummary.innerHTML = `
    <span class="rating-avg">${avg.toFixed(1)}</span>
    <div class="stars-display">${renderStars(avg, 18)}</div>
    <span class="rating-count">(${reviews.length} review${reviews.length !== 1 ? 's' : ''})</span>`;

  list.innerHTML = reviews.map(r => {
    const name = r.reviewerName || 'Anonymous';
    const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const date = r.createdAt && r.createdAt.toDate ? r.createdAt.toDate().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '';
    return `<div class="review-card">
      <div class="review-header">
        <div class="review-avatar">${initials}</div>
        <div>
          <div class="review-author">${escHtml(name)}</div>
          ${date ? `<div class="review-date">${date}</div>` : ''}
        </div>
        <div class="review-stars">${renderStars(r.rating || 0, 14)}</div>
      </div>
      ${r.comment ? `<p class="review-text">${escHtml(r.comment)}</p>` : ''}
    </div>`;
  }).join('');
}

// ── Escape helpers ────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) {
  return String(s).replace(/'/g, "\\'").replace(/\\/g, '\\\\');
}
